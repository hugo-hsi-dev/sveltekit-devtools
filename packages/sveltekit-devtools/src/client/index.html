<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>SvelteKit Devtools</title>
	</head>
	<body>
		<div id="app">
			<nav id="rail" class="rail" aria-label="Views"></nav>

			<div class="content">
				<header class="content-header">
					<div id="view-title" class="view-title"></div>
					<div class="actions">
						<span id="status" class="status">Connecting</span>
						<button id="open-command-palette" type="button">Commands</button>
						<button
							id="refresh"
							class="icon-button"
							type="button"
							title="Refresh"
							aria-label="Refresh"
						>
							↻
						</button>
						<button id="clear-loads" type="button">Clear loads</button>
					</div>
				</header>

				<div class="panel-area">
					<aside id="routes-sidebar" class="routes-sidebar hidden">
						<label class="search">
							<span>Search routes</span>
							<input id="route-search" type="search" autocomplete="off" placeholder="/blog/:slug" />
						</label>
						<div id="routes-list" class="routes-list"></div>
					</aside>

					<section class="panel">
						<div id="overview-view" class="view"></div>
						<div id="routes-view" class="view hidden"></div>
						<div id="loads-view" class="view hidden"></div>
						<div id="timeline-view" class="view hidden"></div>
						<div id="hooks-view" class="view hidden"></div>
						<div id="imports-view" class="view hidden"></div>
						<div id="plugins-view" class="view hidden"></div>
						<div id="runtime-config-view" class="view hidden"></div>
						<div id="build-analyze-view" class="view hidden"></div>
						<div id="inspect-view" class="view hidden"></div>
						<div id="tasks-view" class="view hidden"></div>
						<div id="open-graph-view" class="view hidden"></div>
						<div id="remotes-view" class="view hidden"></div>
						<div id="server-routes-view" class="view hidden"></div>
						<div id="actions-view" class="view hidden"></div>
						<div id="assets-view" class="view hidden"></div>
						<div id="components-view" class="view hidden"></div>
						<div id="virtual-files-view" class="view hidden"></div>
						<div id="settings-view" class="view hidden"></div>
					</section>
				</div>
			</div>
		</div>
		<div id="command-palette" class="palette hidden"></div>
		<script type="module" src="/main.ts"></script>
	</body>
</html>
